# notes-mcp Web 后端配置(Spring Boot + Spring AI)
# 对应 docs/配置.md §2 的 Web 后端部分。

spring:
  application:
    name: notes-mcp-backend

  ai:
    # —— Ollama(本地,默认)——
    ollama:
      base-url: http://127.0.0.1:11434   # 用 127.0.0.1 避 IPv6
      chat:
        options:
          model: qwen3:8b
          temperature: 0.7

    # —— OpenAI(第三方 API / 自定义端点)——默认禁用——
    # 运行时通过 settings.json 或 /api/settings API 配置。
    openai:
      api-key: unused                    # Spring 自动配置要求有值
      base-url: https://api.openai.com/v1

    # —— MCP client:连 notes-mcp server——
    # Spring AI 的 HttpClient transport 支持 streamable-http,
    # notes-mcp(fastmcp)以 `serve --transport http` 暴露 http://127.0.0.1:8765/mcp。
    # 连上后 server 的 tools(search_notes 等)自动注册为 ToolCallbackProvider。
    mcp:
      client:
        # stdio:Spring Boot spawn notes-mcp 子进程,走标准 MCP(stdio)连接。
        # 互操作性最好(Phase 2 agent/check_server 都用 stdio 成功);
        # 绕开 streamable-http 跨实现(Spring AI Java ↔ fastmcp Python)的互操作坑
        # (见踩坑记录)。远程/两台互通时再调 streamable-http。
        stdio:
          connections:
            notes-mcp:
              command: D:/Learn/AI/项目/notes-mcp/venv/Scripts/python.exe
              args:
                - -u                    # Python stdout 无缓冲(MCP stdio 要即时 flush,否则 Java client 读不到→超时)
                - -m
                - notes_mcp
                - serve
                - --transport
                - stdio
              cwd: D:/Learn/AI/项目/notes-mcp
              env:
                PYTHONUNBUFFERED: "1"    # 双保险:环境变量强制无缓冲
                PYTHONPATH: "D:/Learn/AI/项目/notes-mcp"
                NOTES_DIR: ${NOTES_DIR:d:/Learn/AI/笔记}   # 从 main() 注入的系统属性读取,传给 Python 子进程

# Web 后端端口(配置.md §2:前端 5173 → 后端 8000 → notes-mcp 8765)
server:
  port: 8000

logging:
  level:
    org.springframework.ai: INFO
    io.modelcontextprotocol: INFO   # MCP client(调试互操作时可改 DEBUG)

# —— notes-mcp 自定义配置 ——
notesmcp:
  settings:
    path: D:/Learn/AI/项目/notes-mcp/settings.json   # 多 Provider 配置文件
